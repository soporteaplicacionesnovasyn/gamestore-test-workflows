name: rapid-workflow
version: 1
description: Rapid iteration without design and specs
artifacts:
  - id: proposal
    generates: proposal.md
    description: High-level description of the change, its motivation, and scope
    template: proposal.md
    requires: []
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    requires: []
apply:
  requires:
    - tasks
  tracks: tasks.md
